<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- brand blue gradient (matches the published blue-check extension icon) -->
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4c8dff"/>
      <stop offset="1" stop-color="#3f6ae0"/>
    </linearGradient>
    <!-- soft top highlight for a little depth -->
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="checkshadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#1c3a86" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!--
    macOS icon grid: artwork sits in the centred 824x824 region of a 1024
    canvas (~100px transparent margin per side), with Apple's continuous
    "squircle" corner (radius ~22.37% of the side => ~184 on 824).
    The transparent margin is what makes it sit the same size as neighbours.
  -->
  <g transform="translate(100,100)">
    <rect x="0" y="0" width="824" height="824" rx="184" ry="184" fill="url(#g)"/>
    <rect x="0" y="0" width="824" height="824" rx="184" ry="184" fill="url(#sheen)"/>

    <!-- white check, centred and optically balanced -->
    <g filter="url(#checkshadow)">
      <path d="M243 430 L370 560 L595 275"
            fill="none" stroke="#ffffff" stroke-width="86"
            stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
</svg>
