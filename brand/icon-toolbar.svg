<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- GemType toolbar / store / ribbon icon: near full-bleed rounded square so
       the check stays legible at 16px. Matches the published store brand
       (teal -> blue -> indigo diagonal). Rendered from vector at every size. -->
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a99b0"/>
      <stop offset="0.5" stop-color="#3282c8"/>
      <stop offset="1" stop-color="#496adf"/>
    </linearGradient>
  </defs>
  <rect x="6" y="6" width="116" height="116" rx="27" ry="27" fill="url(#g)"/>
  <path d="M37 66 L56 85 L93 39" fill="none" stroke="#ffffff"
        stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
