<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- GemType app icon (macOS / Safari app tile): Apple icon grid — artwork in
       the centred 824/1024 region with the continuous squircle corner and a
       transparent margin so it sits the same size as neighbouring apps.
       Gradient matches the published store brand: teal -> blue -> indigo. -->
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a99b0"/>
      <stop offset="0.5" stop-color="#3282c8"/>
      <stop offset="1" stop-color="#496adf"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.20"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="cs" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#12345f" flood-opacity="0.30"/>
    </filter>
  </defs>
  <g transform="translate(100,100)">
    <rect width="824" height="824" rx="184" ry="184" fill="url(#g)"/>
    <rect width="824" height="824" rx="184" ry="184" fill="url(#sheen)"/>
    <g filter="url(#cs)">
      <path d="M243 430 L370 560 L595 275" fill="none" stroke="#ffffff"
            stroke-width="86" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
</svg>
